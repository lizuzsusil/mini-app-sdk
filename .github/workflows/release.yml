name: Publish CDN

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      # Commit the built dist folder into the tag
      - name: Commit dist folder
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          if git diff --quiet dist/; then
            echo "No changes in dist folder"
          else
            git add dist/
            git commit -m "chore: update dist for v${GITHUB_REF#refs/tags/v} [skip ci]" || echo "Nothing to commit"
            git push origin HEAD:${GITHUB_REF#refs/heads/} --force-with-lease
          fi